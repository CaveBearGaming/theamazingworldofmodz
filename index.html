<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mod Search Engine</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0a0a0f;
      color: #e8f4ff;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Xbox 360 animated background blades */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 120% 60% at 10% 50%, rgba(16, 124, 16, 0.18) 0%, transparent 60%),
        radial-gradient(ellipse 80% 80% at 90% 20%, rgba(0, 90, 180, 0.12) 0%, transparent 50%),
        linear-gradient(135deg, #050510 0%, #0a0a1a 40%, #070d07 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Blade accent lines */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #107c10, #52b043, #107c10, transparent);
      z-index: 10;
    }

    .page-wrap {
      position: relative;
      z-index: 1;
      padding: 0 24px 40px;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 36px 0 28px;
      position: relative;
    }

    .header::after {
      content: '';
      display: block;
      width: 320px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #52b043, #107c10, #52b043, transparent);
      margin: 18px auto 0;
    }

    h1 {
      font-size: 32px;
      font-weight: 300;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #ffffff;
      text-shadow: 0 0 30px rgba(82, 176, 67, 0.6), 0 0 60px rgba(82, 176, 67, 0.2);
    }

    h1 span {
      color: #52b043;
      font-weight: 600;
    }

    /* Xbox ring decoration */
    .xbox-ring {
      display: inline-block;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 3px solid #52b043;
      box-shadow: 0 0 12px rgba(82,176,67,0.7), inset 0 0 8px rgba(82,176,67,0.2);
      margin-bottom: 12px;
      position: relative;
    }
    .xbox-ring::before {
      content: 'X';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      color: #52b043;
      text-shadow: 0 0 10px rgba(82,176,67,0.9);
    }

    /* Aero glass search box */
    .search-box {
      max-width: 680px;
      margin: 0 auto 36px;
      position: relative;
    }

    .search-box form {
      display: flex;
      gap: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
      border: 1px solid rgba(82, 176, 67, 0.35);
      border-radius: 4px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(82,176,67,0.1),
        0 4px 24px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .search-box input[type="text"] {
      flex: 1;
      padding: 13px 18px;
      background: transparent;
      border: none;
      color: #e8f4ff;
      font-size: 15px;
      font-family: 'Segoe UI', Arial, sans-serif;
      outline: none;
      letter-spacing: 0.3px;
    }

    .search-box input[type="text"]::placeholder {
      color: rgba(160, 200, 255, 0.35);
    }

    .search-box button {
      padding: 13px 26px;
      background: linear-gradient(180deg, #1a7a16 0%, #107c10 50%, #0d6b0d 100%);
      border: none;
      border-left: 1px solid rgba(82,176,67,0.4);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Segoe UI', Arial, sans-serif;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
    }

    .search-box button:hover {
      background: linear-gradient(180deg, #22991e 0%, #1a8a16 50%, #148a14 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.22), 0 0 12px rgba(82,176,67,0.3);
    }

    .search-box button:active {
      background: linear-gradient(180deg, #0d6b0d 0%, #107c10 100%);
    }

    /* Section header — blade style */
    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0 0 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(82,176,67,0.2);
    }

    .blade-accent {
      width: 4px;
      height: 22px;
      background: linear-gradient(180deg, #52b043, #107c10);
      border-radius: 2px;
      box-shadow: 0 0 8px rgba(82,176,67,0.6);
    }

    h2 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #c8e6c0;
    }

    .fire-icon { color: #ff6b35; margin-right: 2px; }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    /* Aero glass card */
    .card {
      background: linear-gradient(
        160deg,
        rgba(255,255,255,0.065) 0%,
        rgba(255,255,255,0.025) 50%,
        rgba(82,176,67,0.03) 100%
      );
      border: 1px solid rgba(255,255,255,0.09);
      border-top: 1px solid rgba(255,255,255,0.14);
      border-radius: 4px;
      padding: 14px 15px;
      cursor: pointer;
      text-decoration: none;
      color: #e8f4ff;
      display: block;
      transition: all 0.18s ease;
      position: relative;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.07);
    }

    /* Aero gloss highlight */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 45%;
      background: linear-gradient(180deg, rgba(255,255,255,0.07) 0%, transparent 100%);
      border-radius: 4px 4px 0 0;
      pointer-events: none;
    }

    /* Green left edge on hover */
    .card::after {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, #52b043, #107c10);
      opacity: 0;
      transition: opacity 0.18s;
      box-shadow: 0 0 8px rgba(82,176,67,0.7);
    }

    .card:hover {
      background: linear-gradient(
        160deg,
        rgba(255,255,255,0.1) 0%,
        rgba(255,255,255,0.05) 50%,
        rgba(82,176,67,0.07) 100%
      );
      border-color: rgba(82,176,67,0.4);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.5), 0 0 12px rgba(82,176,67,0.12), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .card:hover::after { opacity: 1; }

    .title {
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.3px;
      margin-bottom: 7px;
      color: #ffffff;
      line-height: 1.3;
    }

    .desc {
      font-size: 11.5px;
      color: rgba(180, 210, 240, 0.6);
      height: 38px;
      overflow: hidden;
      line-height: 1.5;
    }

    .tag {
      font-size: 11px;
      margin-top: 10px;
      color: #52b043;
      font-weight: 600;
      letter-spacing: 0.3px;
      text-shadow: 0 0 6px rgba(82,176,67,0.5);
    }

    .tag::before {
      content: '▼ ';
      font-size: 8px;
      vertical-align: 1px;
    }

    /* Loading skeleton cards */
    .skeleton-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 4px;
      padding: 14px 15px;
      animation: pulse 1.6s ease-in-out infinite;
    }

    .skeleton-line {
      height: 11px;
      border-radius: 3px;
      background: rgba(255,255,255,0.07);
      margin-bottom: 8px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
    ::-webkit-scrollbar-thumb {
      background: rgba(82,176,67,0.35);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover { background: rgba(82,176,67,0.55); }

    /* Footer glow */
    .footer-glow {
      text-align: center;
      margin-top: 40px;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(82,176,67,0.3);
    }
  </style>
</head>
<body>
<div class="page-wrap">

  <div class="header">
    <div class="xbox-ring"></div>
    <h1><span>Mod</span> Search Engine</h1>
  </div>

  <div class="search-box">
    <form action="https://cse.google.com/cse" method="GET" target="_blank">
      <input type="hidden" name="cx" value="d60b7b269e3484bce">
      <input
        type="text"
        name="q"
        placeholder="Search mods..."
      />
      <button type="submit">Search</button>
    </form>
  </div>

  <div class="section-header">
    <div class="blade-accent"></div>
    <h2>Popular Mods &mdash; Modrinth</h2>
  </div>

  <div id="grid" class="grid"></div>

  <div class="footer-glow">Powered by Modrinth API</div>
</div>

<script>
async function loadMods() {
  const grid = document.getElementById("grid");

  for (let i = 0; i < 12; i++) {
    const sk = document.createElement("div");
    sk.className = "skeleton-card";
    sk.innerHTML = `
      <div class="skeleton-line" style="width:70%"></div>
      <div class="skeleton-line" style="width:90%"></div>
      <div class="skeleton-line" style="width:55%"></div>
      <div class="skeleton-line" style="width:40%; margin-top:16px;"></div>
    `;
    grid.appendChild(sk);
  }

  try {
    const res = await fetch("https://api.modrinth.com/v2/search?limit=50&index=downloads");
    const data = await res.json();

    grid.innerHTML = "";

    data.hits.forEach(mod => {
      const card = document.createElement("a");
      card.className = "card";
      card.href = `https://modrinth.com/mod/${mod.slug}`;
      card.target = "_blank";
      card.innerHTML = `
        <div class="title">${mod.title}</div>
        <div class="desc">${mod.description || "No description available"}</div>
        <div class="tag">${mod.downloads.toLocaleString()} downloads</div>
      `;
      grid.appendChild(card);
    });
  } catch (e) {
    grid.innerHTML = `<p style="color:rgba(180,210,240,0.5); grid-column:1/-1; text-align:center; padding:40px; letter-spacing:1px; font-size:13px;">FAILED TO LOAD MODS</p>`;
  }
}
loadMods();
</script>
</body>
</html>
