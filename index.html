<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mod Search Engine</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    /* Search bar */
    .search-container {
      display: flex;
      justify-content: center;
      margin: 10px;
    }

    input {
      width: 60%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    /* Results grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: #1c1c1c;
      padding: 15px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      transition: 0.2s;
      display: block;
    }

    .card:hover {
      transform: scale(1.05);
      background: #2a2a2a;
    }

    .title {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .desc {
      font-size: 12px;
      color: #aaa;
      height: 40px;
      overflow: hidden;
    }

    .tag {
      font-size: 11px;
      margin-top: 8px;
      color: #7cc7ff;
    }
  </style>
</head>

<body>

<header>
  <h1>Mod Search Engine</h1>
  <p>“9Minecraft if it was actually good”</p>
</header>

<!-- SEARCH -->
<div class="search-container">
  <input id="search" placeholder="Search mods (Modrinth)..." />
</div>

<!-- RESULTS -->
<div id="results" class="grid"></div>

<script>
const resultsDiv = document.getElementById("results");
const searchBox = document.getElementById("search");

// 🔍 LIVE SEARCH
async function searchMods(query) {
  if (!query) return;

  const res = await fetch(
    `https://api.modrinth.com/v2/search?query=${encodeURIComponent(query)}&limit=24`
  );

  const data = await res.json();
  render(data.hits);
}

// 🧱 POPULAR MODS (TOP 50)
async function loadPopular() {
  const res = await fetch(
    "https://api.modrinth.com/v2/search?limit=50&index=downloads"
  );

  const data = await res.json();
  render(data.hits);
}

// 🖼️ RENDER CARDS
function render(mods) {
  resultsDiv.innerHTML = "";

  mods.forEach(mod => {
    const a = document.createElement("a");
    a.className = "card";
    a.href = `https://modrinth.com/mod/${mod.slug}`;
    a.target = "_blank";
    a.rel = "noopener noreferrer";

    a.innerHTML = `
      <div class="title">${mod.title}</div>
      <div class="desc">${mod.description || "No description"}</div>
      <div class="tag">⬇ ${mod.downloads.toLocaleString()} downloads</div>
    `;

    resultsDiv.appendChild(a);
  });
}

// ⌨️ SEARCH INPUT
let timeout;
searchBox.addEventListener("input", (e) => {
  clearTimeout(timeout);

  timeout = setTimeout(() => {
    const q = e.target.value.trim();

    if (q.length === 0) {
      loadPopular();
    } else {
      searchMods(q);
    }
  }, 250);
});

// INIT
loadPopular();
</script>

</body>
</html>
