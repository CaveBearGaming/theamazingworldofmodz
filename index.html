<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mod Search Engine</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    header {
      text-align: center;
      padding: 20px;
    }

    h1 { margin: 0; }

    /* Search area */
    .search-box {
      display: flex;
      justify-content: center;
      margin: 20px;
    }

    /* Mod grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: #1c1c1c;
      padding: 15px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      transition: 0.2s;
      display: block;
    }

    .card:hover {
      transform: scale(1.05);
      background: #2a2a2a;
    }

    .title {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .desc {
      font-size: 12px;
      color: #aaa;
      height: 40px;
      overflow: hidden;
    }

    .tag {
      font-size: 11px;
      margin-top: 8px;
      color: #7cc7ff;
    }

    /* Make Google CSE minimal */
    .gsc-control-cse {
      background: transparent !important;
      border: none !important;
    }

    .gsc-search-button,
    .gsc-resultsHeader,
    .gsc-refinementBlock {
      display: none !important;
    }

    input.gsc-input {
      border-radius: 10px !important;
      padding: 10px !important;
    }
  </style>
</head>

<body>

<header>
  <h1>Mod Search Engine</h1>
  <p>“9Minecraft if it was actually good”</p>
</header>

<!-- GOOGLE SEARCH (restored, not iframe-like) -->
<div class="search-box">
  <script async src="https://cse.google.com/cse.js?cx=d60b7b269e3484bce"></script>

  <div class="gcse-search"
       data-newWindow="true"
       data-refinementStyle="hidden"
       data-enableAutoComplete="false">
  </div>
</div>

<h2 style="text-align:center;">🔥 Popular Mods</h2>
<div id="grid" class="grid"></div>

<script>
async function loadMods() {
  const res = await fetch(
    "https://api.modrinth.com/v2/search?limit=50&index=downloads"
  );

  const data = await res.json();
  const grid = document.getElementById("grid");

  data.hits.forEach(mod => {
    const card = document.createElement("a");
    card.className = "card";
    card.href = `https://modrinth.com/mod/${mod.slug}`;
    card.target = "_blank";
    card.rel = "noopener noreferrer";

    card.innerHTML = `
      <div class="title">${mod.title}</div>
      <div class="desc">${mod.description || "No description"}</div>
      <div class="tag">⬇ ${mod.downloads.toLocaleString()} downloads</div>
    `;

    grid.appendChild(card);
  });
}

loadMods();
</script>

</body>
</html>
